<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Checkout — TechNest</title>
<meta name="description" content="Review your cart and checkout."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"/>
<link rel="stylesheet" href="assets/styles.css"/>
</head>
<body>
<div data-header></div>
<main class="container section">
  <h1>Checkout</h1>
  <p style="color:var(--muted);margin:10px 0 30px">This is a protected page — only signed-in customers can view it.</p>
  <div class="form-card" style="margin:0">
    <h2>Cart summary</h2>
    <p class="lead">Items in your cart: <strong id="cartCount">0</strong></p>
    <p style="color:var(--muted);font-size:.9rem;margin-bottom:18px">Demo only — checkout is not connected to a payment processor.</p>
    <a class="btn btn-primary" href="products.html">Continue shopping</a>
  </div>
</main>
<div data-footer></div>
<script src="assets/main.js"></script>
<script>
  if(!TN_requireAuth()) { /* redirected */ }
  else {
    document.getElementById('cartCount').textContent = localStorage.getItem('tn_cart')||'0';
  }
</script>
</body>
</html>

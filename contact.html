<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Contact — TechNest</title>
<meta name="description" content="Get in touch with the TechNest team."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"/>
<link rel="stylesheet" href="assets/styles.css"/>
</head>
<body>
<div data-header></div>
<main class="container">
  <form class="form-card" id="contactForm" novalidate>
    <h1>Contact us</h1>
    <p class="lead">Questions, feedback, or partnership inquiries — we'd love to hear from you.</p>
    <div id="formAlert"></div>
    <div class="field">
      <label for="name">Name</label>
      <input id="name" name="name" type="text" required/>
      <span class="error-msg"></span>
    </div>
    <div class="field">
      <label for="email">Email</label>
      <input id="email" name="email" type="email" required/>
      <span class="error-msg"></span>
    </div>
    <div class="field">
      <label for="phone">Phone (optional)</label>
      <input id="phone" name="phone" type="tel" placeholder="+1 555 123 4567"/>
      <span class="error-msg"></span>
    </div>
    <div class="field">
      <label for="message">Message</label>
      <textarea id="message" name="message" required></textarea>
      <span class="error-msg"></span>
    </div>
    <button type="submit">Send message</button>
  </form>
</main>
<div data-footer></div>
<script src="assets/main.js"></script>
<script src="assets/contact.js"></script>
</body>
</html>

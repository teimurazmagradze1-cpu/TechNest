<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Sign In — TechNest</title>
<meta name="description" content="Sign in to your TechNest account."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"/>
<link rel="stylesheet" href="assets/styles.css"/>
</head>
<body>
<div data-header></div>
<main class="container">
  <form class="form-card" id="loginForm" novalidate>
    <h1>Welcome back</h1>
    <p class="lead">Sign in to access your cart, orders and saved items.</p>
    <div id="formAlert"></div>
    <div class="field">
      <label for="name">Full name</label>
      <input id="name" name="name" type="text" autocomplete="name" required/>
      <span class="error-msg" data-for="name"></span>
    </div>
    <div class="field">
      <label for="email">Email</label>
      <input id="email" name="email" type="email" autocomplete="email" required/>
      <span class="error-msg" data-for="email"></span>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <div class="password-wrap">
        <input id="password" name="password" type="password" autocomplete="current-password" required/>
        <button type="button" class="toggle-pw" id="togglePw" aria-label="Show password">Show</button>
      </div>
      <span class="error-msg" data-for="password"></span>
    </div>
    <button type="submit">Sign in</button>
    <p class="form-foot">No account? <a href="#">Create one</a></p>
  </form>
</main>
<div data-footer></div>
<script src="assets/main.js"></script>
<script src="assets/auth.js"></script>
</body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Product — TechNest</title>
    <meta name="description" content="Product details." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
    />
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body>
    <div data-header></div>
    <main class="container">
      <section id="detail" class="detail">
        <div class="loader" style="grid-column: 1/-1">
          <div class="spinner"></div>
          <p>Loading product…</p>
        </div>
      </section>
    </main>
    <div data-footer></div>
    <script src="assets/main.js"></script>
    <script>
      (async function () {
        const id = parseInt(
          new URLSearchParams(location.search).get("id") || "1",
          10,
        );
        const el = document.getElementById("detail");
        try {
          const res = await fetch("assets/products.json");
          if (!res.ok) throw 0;
          const all = await res.json();
          const p = all.find((x) => x.id === id);
          if (!p) throw 0;
          el.innerHTML = `
          <figure class="thumb"><img src="${p.image}" alt="${p.title}"/></figure>
          <div class="detail-info">
            <p style="color:var(--muted);text-transform:uppercase;font-size:.8rem;letter-spacing:.05em">${p.category}</p>
            <h1>${p.title}</h1>
            <div class="rating">★ ${p.rating?.rate ?? "—"} <span style="color:var(--muted)">(${p.rating?.count ?? 0} reviews)</span></div>
            <div class="price">$${p.price.toFixed(2)}</div>
            <p>${p.description}</p>
            <div class="actions">
              <button class="btn btn-primary" onclick="TN_addToCart()">Add to cart</button>
              <a class="btn btn-outline" href="products.html">← Back to products</a>
            </div>
          </div>
        `;
        } catch (e) {
          el.innerHTML =
            '<p style="color:var(--muted);grid-column:1/-1;padding:40px">Product not found.</p>';
        }
      })();
    </script>
  </body>
</html>
